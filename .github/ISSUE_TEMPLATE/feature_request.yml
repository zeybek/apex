name: Feature request
description: Suggest a new skill, reference, or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What engineering situation is poorly served today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: A new skill, a reference, a workflow improvement, etc.
    validations:
      required: true
  - type: checkboxes
    id: portability
    attributes:
      label: Portability check
      options:
        - label: This proposal stays language- and framework-agnostic (no stack-specific content)
          required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Examples, prior art, related issues.
    validations:
      required: false
